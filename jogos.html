<!DOCTYPE html>
<html lang="pt">
<head>
    <title>Biblioteca de jogos</title>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="imagens/i1.png">
</head>
<body>
    <header>
        <div class="title">
        <h1>Biblioteca de jogos</h1>
        </div>
        <div class="backnav">
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="jogos.html">Jogos</a></li>
                <li><a href="sobre.html">Sobre</a></li>
            </ul>
        </nav>
        </div>
    </header>
    <section class="pesquisar-jogos">
        <input type="text" id="search" placeholder="Pesquisar Jogo...">
    </section>
    <section id="filters">
        <button data-genero="acao">Ação</button>
        <button data-genero="desporto">Desporto</button>
        <button data-genero="rpg">RPG</button>
        <button data-genero="aventura">Aventura</button>
        <button data-genero="historia">Historia</button>
    </section>
    <section id="filters-plataforma">
        <button data-plataforma="pc">PC</button>
        <button data-plataforma="ps4">PS4</button>
        <button data-plataforma="ps5">PS5</button>
        <button data-plataforma="xbox">XBOX</button>
        <button data-plataforma="psp">PSP</button>
        <button data-plataforma="nintendo">Nintendo Switch</button>
        <button data-plataforma="ps3">PS3</button>
    </section>
    <section id="toggle-section">
        <button id="btn-adicionar-toggle">Adicionar Jogo</button>
    </section>
    <section id="adicionar-jogos" class="hidden">
        <h3 id="form-titulo">Adicionar Jogos</h3>
        <input type="text" id="input-nome" placeholder="Nome">
        <input type="file" id="input-imagem" accept="image/*">
        <select id="input-genero" multiple>
            <option value="acao">Ação</option>
            <option value="rpg">RPG</option>
            <option value="desporto">Desporto</option>
            <option value="aventura">Aventura</option>
            <option value="historia">Historia</option>
        </select>
        <input type="text" id="input-plataforma" placeholder="Plataformas (ex: pc, ps5)">
        <input type="number" id="input-ano" placeholder="Ano" step=""0.1 min="1900">
        <input type="text" id="input-descricao" placeholder="Descrição">
        <input type="number" id="input-rating" placeholder="Rating (0-10)" step="0.1" min="0" max="10">
        <button onclick="submeterJogo()">Adicionar</button>
    </section>
    <section id="games-container">
    



    </section>
    <script src="scriptJogos.js"></script>
    <footer>
        <p>Copyright Tomás Carvalho</p>
    </footer>
    <div id="popup" class="hidden">
        <p id="popup-mensagem"></p>
        <button onclick="fecharPopup()">OK</button>
    </div>
</body>
</html>
